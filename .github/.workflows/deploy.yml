name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security scan (Bandit)
      run: bandit -r app/ -f json -o bandit-report.json || true
    
    - name: Check dependencies (Safety)
      run: safety check || true
  
  test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create instance folder
      run: mkdir -p instance uploads logs
    
    - name: Test import
      run: |
        python -c "from app import create_app; app = create_app('testing')"
        echo "✅ Import test passed"
  
  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Deploy to Render
      env:
        DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -n "$DEPLOY_URL" ]; then
          curl -X POST "$DEPLOY_URL"
          echo "✅ Deployed to Render"
        else
          echo "⚠️ No Render deploy hook set"
        fi
  
  deploy-heroku:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Heroku
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      run: |
        if [ -n "$HEROKU_API_KEY" ] && [ -n "$HEROKU_APP_NAME" ]; then
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/$HEROKU_APP_NAME.git
          git push heroku HEAD:main -f
          echo "✅ Deployed to Heroku"
        else
          echo "⚠️ No Heroku credentials set"
        fi
